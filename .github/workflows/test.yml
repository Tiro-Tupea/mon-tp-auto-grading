name: Auto-grading TP

on:
  push:
    branches: [ main ]
    paths:
      - 'eleves/**/*.py'
      - 'tests/**/*.py'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: tp_user
          POSTGRES_PASSWORD: tp_password
          POSTGRES_DB: tp_grading
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest psycopg2-binary python-dotenv

    - name: Setup database
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: tp_user
        DB_PASSWORD: tp_password
        DB_NAME: tp_grading
      run: python scripts/setup_db.py

    - name: Run tests and save results
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: tp_user
        DB_PASSWORD: tp_password
        DB_NAME: tp_grading
        GITHUB_SHA: ${{ github.sha }}
      run: python scripts/save_results.py

    - name: Comment PR with results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const { execSync } = require('child_process');
          const output = execSync('python scripts/run_all_tests.py', { encoding: 'utf8' });
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '## 📊 Résultats des tests\n\n```\n' + output + '\n```'
          });
